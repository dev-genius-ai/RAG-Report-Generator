version: '3.8'

services:
  rag-app:
    build:
      context: .
      dockerfile: Dockerfile
    image: rag-company-report:latest
    container_name: rag-app
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - CHROMA_PERSIST_DIRECTORY=/app/data/chroma_db
      - REPORT_OUTPUT_DIR=/app/reports
      - LOG_DIR=/app/logs
    volumes:
      # Persist vector database
      - ./data:/app/data
      # Persist logs
      - ./logs:/app/logs
      # Persist reports
      - ./reports:/app/reports
      # Mount raw data for ingestion
      - ./data/raw_data:/app/data/raw_data:ro
    working_dir: /app
    command: ["python", "main.py", "--help"]
    restart: unless-stopped
    networks:
      - rag-network

  # Optional: Jupyter notebook for interactive development
  jupyter:
    build:
      context: .
      dockerfile: Dockerfile
    image: rag-company-report:latest
    container_name: rag-jupyter
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - JUPYTER_ENABLE_LAB=yes
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./reports:/app/reports
      - ./notebooks:/app/notebooks
    ports:
      - "8888:8888"
    command: >
      bash -c "pip install jupyter jupyterlab &&
               jupyter lab --ip=0.0.0.0 --port=8888 --no-browser
               --allow-root --NotebookApp.token='' --NotebookApp.password=''"
    restart: unless-stopped
    networks:
      - rag-network
    profiles:
      - dev

networks:
  rag-network:
    driver: bridge

volumes:
  chroma_data:
    driver: local
  logs_data:
    driver: local
  reports_data:
    driver: local

